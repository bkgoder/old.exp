version: '3.9'

services:
  tts-server:
    build: .
    container_name: zero-token-tts
    restart: unless-stopped
    ports:
      - "18764:18764"
      - "18765:18765"
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MCP_PORT=18764
      - TTS_PORT=18765
      - WEB_PORT=3000
      - TTS_BACKEND=http://localhost:18765
      - MCP_BACKEND=http://localhost:18764
      - TTS_ASSETS_DIR=/app/tts-server
    volumes:
      - tts-data:/app/tts-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  tts-data:
